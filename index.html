<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя электронная копилка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
        }
        .balance {
            font-size: 48px;
            color: green;
            font-weight: bold;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>🐷 Электронная копилка</h1>
    <div class="balance">
        💰 Баланс: <span id="balance">0.00</span> ₽
    </div>
    <button onclick="updateBalance()">Обновить</button>

    <script>
        // Здесь будет твой код для получения данных с сервера
        function updateBalance() {
            fetch('/api/balance')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('balance').innerText = data.balance;
                })
                .catch(error => {
                    console.log('Ошибка:', error);
                });
        }
        
        // Обновляем баланс каждые 5 секунд
        setInterval(updateBalance, 5000);
        updateBalance();
    </script>
</body>
</html>
